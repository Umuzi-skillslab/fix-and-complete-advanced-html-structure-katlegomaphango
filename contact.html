<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="top">
        <h1>Contact Us</h1>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="media.html">Media</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h2>Get In Touch</h2>
        
        <!-- Form with multiple errors -->
        <form action="/submit" method="post">
            <fieldset>
                <label for="name">Name:</label>
                <input id="name" type="text" name="name" placeholder="Name" required>

                <label for="email">Email:</label>
                <input id="email" type="email" name="email" placeholder="Email" required>

                <label for="phone">Phone:</label>
                <input id="phone" type="tel" name="phone" placeholder="Phone" required>
            </fieldset>
            <fieldset>
                <input type="radio" id="full" name="production" value="full">
                <label for="full">Full production</label>

                <input type="radio" id="semi" name="production" value="semi">
                <label for="semi">Semi production</label>

                <input type="radio" id="editing" name="production" value="editing">
                <label for="editing">Editing only</label>
            </fieldset>
            <fieldset>
                <label for="service">Service:</label>
                <select id="service" name="service" required>
                    <option>Video Production</option>
                    <option>Audio Recording</option>
                    <option>Media Editing</option>
                </select>

                <input type="checkbox" name="subscribe"> Subscribe to newsletter
            </fieldset>
            <fieldset>
                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Message" required
                    minlength="10" maxlength="200"
                >
                </textarea>
            </fieldset>
            
            <!-- Missing: labels, proper input types (email, tel), validation attributes -->
            <!-- Missing: radio buttons, checkboxes, select/dropdown, date/number inputs -->
            <!-- Missing: fieldset for grouping -->
            
            <button type="submit">Submit</button>
        </form>
    </main>
    
    <footer class="bottom">
        <p>Email: contact@mediaproduction.com</p>
    </footer>
</body>
</html>
